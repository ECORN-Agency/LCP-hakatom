name: Poll Shopify theme files

# Hits /api/cron/poll-themes on the Vercel deploy on a schedule so we can
# detect Customizer file edits (Shopify doesn't fire themes/update for them).
#
# Setup (one-time):
#   1. Repo Settings → Secrets and variables → Actions → New repository secret
#   2. Name: CRON_SECRET, Value: same string you set in Vercel env vars
#   3. (Optional) APP_URL secret if your deploy is on a custom domain
#
# Notes on cadence:
#   - GitHub's cron scheduler can drift / skip runs during high load.
#     Don't rely on this for sub-minute SLAs. For our theme polling,
#     a 15-minute interval that occasionally slips to 20 is fine.

on:
  schedule:
    # Every 15 minutes. Adjust if you want tighter detection (min granularity
    # is 5 min via */5, but actual runs can drift more).
    - cron: "*/15 * * * *"
  workflow_dispatch: # lets you run it on demand from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit poll-themes endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL || 'https://lcp-hakatom.vercel.app' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set in this repo"
            exit 1
          fi
          response=$(curl -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --silent --show-error --fail-with-body \
            -w "\nHTTP %{http_code}\n" \
            "$APP_URL/api/cron/poll-themes")
          echo "$response"
